name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  check-generated:
    name: Check Generated Files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install controller-gen & kustomize
        run: make controller-gen kustomize

      - name: Regenerate manifests and code
        run: make manifests generate

      - name: Fail if working tree is dirty
        run: |
          if ! git diff --exit-code; then
            echo ""
            echo "ERROR: Generated files are out of date."
            echo "Run 'make manifests generate' locally and commit the result."
            exit 1
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.8.0   # keep in sync with Makefile GOLANGCI_LINT_VERSION

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [check-generated]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Vet & format check
        run: make fmt vet
      - name: Build manager binary
        run: make build

  docker-staging:
    name: Push Staging Image
    runs-on: ubuntu-latest
    needs: [check-generated, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push staging image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/manager:staging
            ghcr.io/${{ github.repository }}/manager:main-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

