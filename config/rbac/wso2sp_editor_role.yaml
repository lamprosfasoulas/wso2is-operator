# This rule is not used by the project wso2is-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the wso2.it.auth.gr.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: wso2is-operator
    app.kubernetes.io/managed-by: kustomize
  name: wso2sp-editor-role
rules:
- apiGroups:
  - wso2.it.auth.gr
  resources:
  - wso2sps
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - wso2.it.auth.gr
  resources:
  - wso2sps/status
  verbs:
  - get
